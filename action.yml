name: 'GitPet Action'
description: 'Generate an animated SVG Tamagotchi terrarium from your GitHub contributions'
author: 'Dasmat13'

branding:
  icon: 'smile'
  color: 'orange'

inputs:
  github_user_name:
    description: 'GitHub username to generate pet for'
    required: true
    default: ${{ github.actor }}
  github_token:
    description: 'GitHub token for API access'
    required: true
  svg_out_path:
    description: 'Output path for the animated SVG'
    required: false
    default: 'dist/pet.svg'

runs:
  using: 'node20'
  main: 'dist/index.js'
